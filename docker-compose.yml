version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: autoops-postgres
    environment:
      POSTGRES_USER: autoops_user
      POSTGRES_PASSWORD: autoops_password
      POSTGRES_DB: autoops_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoops_user -d autoops_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autoops-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
